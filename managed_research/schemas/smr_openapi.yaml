  /graph-task/rollout:
    post:
      tags:
      - graph-task
      summary: Rollout
      description: "Execute a single graph rollout against a dataset example.\n\n\
        This is the primary endpoint for evaluating a graph candidate.\nIt takes a\
        \ YAML definition, dataset name, and seed, executes\nthe graph, and returns\
        \ the reward along with detailed info.\n\nRequest:\n    - yaml_content: Complete\
        \ graph YAML definition (the \"policy\")\n    - dataset_name: Which dataset\
        \ to use (e.g., \"hotpotqa\")\n    - dataset_seed: Which example from the\
        \ dataset\n    - dataset_config: Optional config (e.g., {\"split\": \"validation\"\
        })\n\nResponse:\n    - success: Whether execution succeeded\n    - reward:\
        \ Score from 0.0-1.0\n    - info: Detailed execution info (output, expected,\
        \ metadata)\n    - error: Error message if failed"
      operationId: rollout_graph_task_rollout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphTaskRolloutRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphTaskRolloutResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /graph-task/batch:
    post:
      tags:
      - graph-task
      summary: Batch Rollout
      description: "Execute batch rollouts - same YAML, multiple seeds.\n\nMore efficient\
        \ than calling /rollout multiple times as it\nallows parallel execution with\
        \ controlled concurrency.\n\nRequest:\n    - yaml_content: Complete graph\
        \ YAML definition\n    - dataset_name: Which dataset to use\n    - dataset_seeds:\
        \ List of seeds to evaluate\n    - max_concurrent: Max parallel executions\
        \ (default: 5)\n\nResponse:\n    - results: List of individual rollout results\n\
        \    - mean_reward: Average reward across successful runs\n    - successful_count:\
        \ Number of successful runs\n    - failed_count: Number of failed runs"
      operationId: batch_rollout_graph_task_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphTaskBatchRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphTaskBatchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
