        \ and\n    environment API keys (sk_env_*) from the SDK's eval job system.\n\
        \nNOTE: This endpoint manually manages DB sessions instead of using\nDepends(get_db)\
        \ because sandbox execution can take 5-10+ minutes,\nwhich would exhaust the\
