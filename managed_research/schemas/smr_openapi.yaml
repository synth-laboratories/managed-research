      description: "Stream job events via Server-Sent Events with robust termination\
        \ handling.\n\nSupports automatic resume via Last-Event-ID header (standard\
        \ SSE reconnection).\nThe browser automatically sends this header on reconnection.\n\
        \nThe stream will terminate when:\n1. A terminal event is received (e.g.,\
        \ job.completed, job.failed)\n2. Job status check returns a terminal state\
        \ (checked every 30s)\n3. Heartbeat timeout is reached (30 minutes default)\n\
        \nArgs:\n    job_id: Job to stream events for\n    since_seq: Start streaming\
        \ from this sequence (query param)\n    last_event_id: Resume from this event\
        \ ID (header, takes precedence)\n\nNote: Uses PostgREST to fetch job metadata\
        \ (no database session required)."
      operationId: stream_prompt_learning_events_api_prompt_learning_online_jobs__job_id__events_stream_get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      - name: since_seq
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Since Seq
      - name: Last-Event-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Last-Event-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
