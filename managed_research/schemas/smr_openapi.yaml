    SmrProjectTriggerRequest:
      properties:
        runbook:
          type: string
          enum:
          - lite
          - heavy
          title: Runbook
          description: Typed orchestration posture for this run. Runbooks control
            collaboration behavior, not model selection.
          default: lite
        host_kind:
          $ref: '#/components/schemas/SmrHostKind'
          description: Required run-level execution substrate. Supported values are
            docker, daytona.
        worker_pool_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Worker Pool Id
          description: Optional per-run worker dispatch pool override. When omitted,
            the run uses the project's execution pool configuration.
        local_execution:
          anyOf:
          - $ref: '#/components/schemas/SmrLocalExecutionRequest'
          - type: 'null'
          description: Explicit local execution handoff from synth-dev. When present
            and requires_hosted_capacity=false, launch preflight uses slot-local capacity
            without hosted Codex pool blockers.
        execution_profile:
          anyOf:
          - $ref: '#/components/schemas/SmrExecutionProfileRequest'
          - type: 'null'
          description: Typed product-owned execution profile for first-party Docker
            and Daytona launches. Backend validates host kind, runtime lane, repo
            binding, and materialized image or snapshot before dispatch.
        timebox_seconds:
          anyOf:
          - type: integer
            minimum: 60.0
          - type: 'null'
          title: Timebox Seconds
        agent_profile:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent Profile
          description: Override one shared agent profile ID for this run. Engineer-only
            profiles must be selected through actor_model_overrides for worker:engineer.
        agent_model:
          anyOf:
          - $ref: '#/components/schemas/SmrAgentModel'
          - type: 'null'
          description: Override one shared agent model for this run. Shared top-level
            values are 'anthropic/claude-haiku-4-5-20251001', 'anthropic/claude-sonnet-4-6',
            'gpt-5.4', 'gpt-5.4-mini', 'gpt-5.4-nano', 'gpt-oss-120b', 'moonshotai/kimi-k2.6',
            'x-ai/grok-4.1-fast'. Use actor_model_overrides for actor-specific model
            selection.
        agent_harness:
          anyOf:
          - type: string
            enum:
            - codex
            - opencode_sdk
          - type: 'null'
          title: Agent Harness
          description: Override the agent harness for this run. Supported public values
            are 'codex' and 'opencode_sdk'.
        agent_kind:
          anyOf:
          - type: string
            enum:
            - codex
            - opencode_sdk
          - type: 'null'
          title: Agent Kind
          description: Compatibility alias for agent_harness. Supported public values
            are 'codex' and 'opencode_sdk'.
        agent_model_params:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Agent Model Params
          description: 'Override agent model params for this run (for example {''reasoning_effort'':
            ''medium''}).'
        actor_model_overrides:
          items:
            $ref: '#/components/schemas/SmrActorModelSelectionRequest'
          type: array
          title: Actor Model Overrides
          description: Deprecated compatibility input for actor-scoped model overrides
            keyed by actor_type and actor_subtype. Prefer roles for new integrations.
        roles:
          anyOf:
          - $ref: '#/components/schemas/SmrRoleBindingsRequest'
          - type: 'null'
          description: 'Role-based launch policy: explicit orchestrator/reviewer bindings
            plus worker palette and subtype overrides.'
        work_mode:
          type: string
          enum:
          - open_ended_discovery
          - directed_effort
          title: Work Mode
          description: Run work mode override for this run.
        providers:
          items:
            $ref: '#/components/schemas/ProviderBinding'
          type: array
          minItems: 1
          title: Providers
          description: Run-scoped provider bindings. Supported public providers are
            openrouter, tinker, and synth_ai.
        limit:
          anyOf:
          - $ref: '#/components/schemas/UsageLimit'
          - type: 'null'
          description: Optional run-scoped usage limit.
        required_capabilities:
          items:
            $ref: '#/components/schemas/ActorResourceCapability'
          type: array
          title: Required Capabilities
          description: Internal proof-lane capability requirement. Defaults to inference.
        initial_runtime_messages:
          items:
            $ref: '#/components/schemas/SmrInitialRuntimeMessageRequest'
          type: array
          title: Initial Runtime Messages
          description: Optional kickoff operator messages for this run. Each item
            is enqueued on the durable runtime message queue at launch (same contract
            as POST /smr/runs/{run_id}/runtime/messages). This is the supported way
            to attach opening intent; the legacy `prompt` field is not accepted.
        sandbox_override:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Sandbox Override
          description: 'Per-run sandbox image/snapshot override for Docker and Daytona
            hosts. Accepts {image: ''...'', snapshot: ''...''} to override the project
            or env default. image takes precedence over snapshot.'
        actor_image_overrides:
          additionalProperties:
            $ref: '#/components/schemas/SmrActorImageBindingRequest'
          type: object
          title: Actor Image Overrides
          description: Optional per-role runtime image release overrides keyed by
            orchestrator, worker, verifier, evaluator, or judge.
        image_override:
          anyOf:
          - $ref: '#/components/schemas/SmrActorImageBindingRequest'
          - type: 'null'
          description: Optional shorthand runtime image release override expanded
            to every otherwise unresolved actor role at run start.
        run_policy:
          anyOf:
          - $ref: '#/components/schemas/SmrRunPolicySpec'
          - type: 'null'
          description: Optional run-scoped policy overlay controlling funding-source
            semantics, credential/tool/inference allowlists, and a total-cost cap
            for this run.
        kickoff_contract:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Kickoff Contract
          description: Optional staged-run kickoff contract. When provided, this becomes
            the authoritative staged contract for the run and is persisted on the
            run row.
        tool_config:
          anyOf:
          - $ref: '#/components/schemas/SmrRunToolConfigRequest'
          - type: 'null'
          description: Optional run-scoped tool configuration. Use this to explicitly
            scope runtime tool access, such as the GitHub repos allowed for this run.
        resource_bindings:
          anyOf:
          - $ref: '#/components/schemas/SmrRunResourceBindingsRequest'
          - type: 'null'
        primary_parent_ref:
          anyOf:
          - $ref: '#/components/schemas/SmrPrimaryParentRefRequest'
          - type: 'null'
        primary_parent:
          anyOf:
          - $ref: '#/components/schemas/SmrPrimaryParentInlineCreateRequest'
          - type: 'null'
        idempotency_key_run_create:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Idempotency Key Run Create
        idempotency_key:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Idempotency Key
      type: object
      required:
      - host_kind
      - work_mode
      - providers
      title: SmrProjectTriggerRequest
