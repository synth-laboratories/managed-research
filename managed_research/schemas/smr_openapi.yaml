  /api/jobs/stream:
    get:
      tags:
      - jobs-stream
      summary: Stream Org Jobs
      description: 'Stream job metadata events for the authenticated organization.


        This endpoint uses Server-Sent Events (SSE) to push job lifecycle events

        in real-time. Events include:


        - `job.created`: A new job was submitted

        - `job.started`: Job execution began

        - `job.completed`: Job finished successfully

        - `job.failed`: Job failed with an error


        Each event contains basic job metadata (job_id, type, status, timestamps)

        sufficient to populate a job list view. For full job details, fetch

        the job by ID using GET /jobs/{job_id}.


        **Reconnection**: If the connection drops, reconnect with the `since_seq`

        query parameter set to the last received event''s sequence number, or use

        the standard SSE `Last-Event-ID` header.


        **Headers**:

        - `Last-Event-ID`: Alternative to `since_seq` for reconnection


        **Example SSE event**:

        ```

        id: 42

        event: job.created

        data: {"org_id": "...", "job_id": "ra_abc123", "job_type": "research_agent",
        "status": "queued", ...}

        ```'
      operationId: stream_org_jobs_api_jobs_stream_get
      parameters:
      - name: since_seq
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Resume from this sequence number
          default: 0
          title: Since Seq
        description: Resume from this sequence number
      - name: Last-Event-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Last-Event-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/jobs/:
    get:
      tags:
      - jobs-facade
      summary: List Jobs
      description: 'Unified job list for the TUI.


