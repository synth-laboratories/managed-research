      properties:
        started_at:
          type: string
          format: date-time
          title: Started At
          description: When inference request started (UTC)
        ended_at:
          type: string
          format: date-time
          title: Ended At
          description: When inference request completed (UTC)
        elapsed_ms:
          type: integer
          title: Elapsed Ms
          description: Total elapsed time in milliseconds
        cache_status:
          type: string
          title: Cache Status
          description: 'Graph cache: ''warm'' (redis) or ''cold'' (database)'
        output:
          title: Output
          description: Model output (json, text, tool calls, or any structured type)
        job_id:
          type: string
          title: Job Id
          description: GEPA job ID
        snapshot_id:
          type: string
          title: Snapshot Id
          description: Snapshot ID used for inference
        usage:
          items:
            $ref: '#/components/schemas/GraphGenGraphCompletionsModelUsage'
          type: array
          title: Usage
          description: Token usage per model
        total_usage:
          anyOf:
          - $ref: '#/components/schemas/GraphGenGraphCompletionsTotalUsage'
          - type: 'null'
          description: Aggregated total usage across all models
        node_timing:
          items:
            $ref: '#/components/schemas/GraphGenGraphNodeTiming'
          type: array
          title: Node Timing
          description: Execution timing per node
        execution_trace:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Execution Trace
          description: Optional execution trace payload for graph runs
        output_validation:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Output Validation
          description: Optional output validation result (present when validate_output=true
            and a schema exists).
        error:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Error
          description: Structured error information if validation or execution failed.
            Contains 'code', 'message', and optional 'details'.
        warnings:
          items:
            type: string
          type: array
          title: Warnings
          description: List of warning messages about output validation or execution
            issues.
      type: object
      required:
      - started_at
      - ended_at
      - elapsed_ms
      - cache_status
      - output
      - job_id
      - snapshot_id
      title: GraphGenGraphCompletionsResponse
      description: 'Response from graph completions.


        The output field is intentionally typed as Any to support:

        - dict: JSON object responses

        - str: Plain text responses

        - list: Tool call responses or arrays

        - any JSON-serializable type: Arbitrary structured responses


        This allows graph completions to work uniformly across different response

        formats while maintaining a consistent response envelope.


        The usage field is a list to support graphs with multiple models.

        The total_usage field provides aggregated totals across all models.

        The node_timing field provides per-node execution timing.'
    GraphGenGraphCompletionsTotalUsage:
      properties:
        prompt_tokens:
          type: integer
          title: Prompt Tokens
          description: Total input tokens across all models
          default: 0
        completion_tokens:
          type: integer
          title: Completion Tokens
          description: Total output tokens across all models
          default: 0
        total_tokens:
          type: integer
          title: Total Tokens
          description: Total tokens across all models
          default: 0
        estimated_cost_usd:
          type: number
          title: Estimated Cost Usd
          description: Total estimated cost in USD
          default: 0.0
        llm_calls:
          type: integer
          title: Llm Calls
          description: Total number of LLM calls
          default: 0
      type: object
      title: GraphGenGraphCompletionsTotalUsage
      description: Aggregated total usage across all models in a graph completion.
    GraphGenGraphJudgeRequest:
      properties:
        job_id:
          type: string
          title: Job Id
          description: GraphGen or GEPA job ID (must be a verifier graph)
        session_trace:
          $ref: '#/components/schemas/SessionTraceInput'
          description: V3 session trace to evaluate (must include event_ids for reward
            linking)
        context:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Context
          description: Additional context for evaluation (rubric, task description,
            etc.)
        prompt_snapshot_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Snapshot Id
          description: 'Specific snapshot to use (default: best)'
      additionalProperties: false
      type: object
      required:
      - job_id
      - session_trace
      title: GraphGenGraphJudgeRequest
      description: 'Request for judge/verifier graph inference.


        Use this endpoint for graphs trained with graph_type="verifier".

        The input should be a trace to evaluate, and the output will be a reward.'
    GraphGenGraphJudgeResponse:
      properties:
        started_at:
          type: string
          format: date-time
          title: Started At
          description: When inference request started (UTC)
        ended_at:
          type: string
          format: date-time
          title: Ended At
          description: When inference request completed (UTC)
        elapsed_ms:
          type: integer
          title: Elapsed Ms
          description: Total elapsed time in milliseconds
        job_id:
          type: string
          title: Job Id
          description: GEPA job ID
        snapshot_id:
          type: string
          title: Snapshot Id
          description: Snapshot ID used for inference
        event_rewards:
          items:
            $ref: '#/components/schemas/EventRewardResponse'
          type: array
          title: Event Rewards
          description: Per-event rewards (keyed by event_id)
        outcome_reward:
          anyOf:
          - $ref: '#/components/schemas/OutcomeRewardResponse'
          - type: 'null'
          description: Episode-level outcome reward
        reward:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Reward
          description: Evaluation reward (0-1), same as outcome_reward.total_reward
        reasoning:
          anyOf:
          - type: string
          - type: 'null'
          title: Reasoning
          description: Explanation for the reward
        sub_rewards:
          anyOf:
          - additionalProperties:
              type: number
            type: object
          - type: 'null'
          title: Sub Rewards
          description: Breakdown rewards by criteria
        raw_output:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Raw Output
          description: Full raw output from the verifier graph
        usage:
          items:
            $ref: '#/components/schemas/GraphGenGraphCompletionsModelUsage'
          type: array
          title: Usage
          description: Token usage per model
      type: object
      required:
      - started_at
      - ended_at
      - elapsed_ms
      - job_id
      - snapshot_id
      - reward
      title: GraphGenGraphJudgeResponse
      description: 'Response from judge/verifier graph inference.


        Returns structured rewards matching synth-ai reward types:

        - event_rewards: List of EventReward (one per timestep)

        - outcome_reward: OutcomeReward (episode-level summary)'
    GraphGenGraphNodeTiming:
      properties:
        node:
          type: string
          title: Node
          description: Node name
        elapsed_ms:
          type: integer
          title: Elapsed Ms
          description: Execution time in milliseconds
        llm_calls:
          type: integer
          title: Llm Calls
          description: Number of LLM calls made by this node
          default: 0
      type: object
      required:
      - node
      - elapsed_ms
      title: GraphGenGraphNodeTiming
      description: Timing information for a single node execution.
    GraphGenGraphRecordRequest:
      properties:
        job_id:
          type: string
          title: Job Id
          description: GraphGen or GEPA job ID
        prompt_snapshot_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Snapshot Id
          description: 'Specific snapshot to use (default: best)'
      type: object
      required:
      - job_id
      title: GraphGenGraphRecordRequest
      description: Request for graph record (get optimized graph/snapshot content).
    GraphGenGraphRecordResponse:
      properties:
        job_id:
          type: string
          title: Job Id
        snapshot_id:
          type: string
          title: Snapshot Id
        prompt:
          type: string
          title: Prompt
          description: Extracted prompt text from the graph
        graph:
          additionalProperties: true
          type: object
          title: Graph
          description: 'PUBLIC export of the optimized graph. NOTE: We NEVER return
            proprietary graph specs/YAML. This dict contains a redacted export only.'
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
          description: Model used for this graph
      type: object
      required:
      - job_id
      - snapshot_id
      - prompt
      - graph
      title: GraphGenGraphRecordResponse
      description: 'Response from graph record endpoint.


        Returns the full graph record (snapshot), which currently contains the prompt

        but may contain additional graph structure in the future.'
    GraphGenGraphSchemaResponse:
      properties:
        job_id:
          type: string
          title: Job Id
          description: GraphGen or GEPA job ID
        gepa_job_id:
          type: string
          title: Gepa Job Id
          description: Underlying GEPA job ID
        input_schema:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Input Schema
          description: JSON schema for graph input. Validates request.input in /graph/completions
        output_schema:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Output Schema
          description: JSON schema for graph output. Describes response.output format
        output_config:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Output Config
          description: Optional output validation configuration (schema/format/strict/extract_from).
        schema_source:
          type: string
          enum:
          - job_metadata
          - dataset
          - inferred
          - unavailable
          title: Schema Source
          description: Where the schema was retrieved from
        example_input:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Example Input
          description: Example input from training dataset
        example_output:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Example Output
          description: Example output from training dataset (if gold outputs available)
        select_output:
          anyOf:
          - {}
          - type: 'null'
          title: Select Output
          description: Output selector used to extract public output from graph state
      type: object
      required:
      - job_id
      - gepa_job_id
      - schema_source
      title: GraphGenGraphSchemaResponse
      description: 'Response from graph schema endpoint.


        Returns input/output schemas for a graph job, enabling:

        - Input validation before inference

        - Type-safe client code generation

        - OpenAPI/Swagger integration'
    GraphGenJobCreateRequest:
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
          description: Human-readable name for this job (e.g., 'oolong v2 experiment').
            Used in logs and summaries.
        dataset:
          anyOf:
          - additionalProperties: true
            type: object
          - type: string
          - type: 'null'
          title: Dataset
          description: GraphGenTaskSet as JSON object or base64-encoded JSON string.
            Required if dataset_id/dataset_name not provided.
        dataset_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Dataset Id
          description: ID of existing standalone dataset (e.g., 'ds_abc123'). Preferred
            over dataset_name.
        dataset_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Dataset Name
          description: Name of existing dataset to reuse (legacy). Prefer dataset_id
            for new integrations.
        initial_graph_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Initial Graph Id
          description: Preset graph ID to optimize. Required. De-novo graph generation
            is disabled.
        optimization_mode:
          type: string
          enum:
          - auto
          - graph_only
          - prompt_only
          title: Optimization Mode
          description: Optimization mode (ignored for graph creation). Graph Evolve
            always runs prompt-only GEPA with a preset graph.
          default: auto
        initial_prompt:
          anyOf:
          - type: string
          - type: 'null'
          title: Initial Prompt
          description: Override initial prompt from dataset
        output_config:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Output Config
          description: Optional output validation config override for this job. If
            provided, overrides any dataset-provided output_config.
        policy_model:
          anyOf:
          - type: string
          - type: 'null'
          title: Policy Model
          description: 'Single policy model (deprecated: use policy_models for multiple
            models)'
        policy_models:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Policy Models
          description: List of policy models to use for workflow/graph optimization
            (allows multiple models)
        rollout_budget:
          type: integer
          maximum: 10000.0
          minimum: 10.0
          title: Rollout Budget
          description: Total number of rollouts for optimization
          default: 100
        rollout_max_concurrent:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Rollout Max Concurrent
          description: Maximum parallel rollouts per candidate evaluation
          default: 25
        rollout_timeout_seconds:
          type: number
          maximum: 600.0
          minimum: 10.0
          title: Rollout Timeout Seconds
          description: Timeout per graph rollout execution in seconds
          default: 60.0
        eval_sample_size:
          anyOf:
          - type: integer
            maximum: 1000.0
            minimum: 10.0
          - type: 'null'
          title: Eval Sample Size
          description: 'Max tasks to evaluate per candidate (default: use all available
            tasks)'
        proposer_effort:
          type: string
          title: Proposer Effort
          description: Proposer effort level (medium, high). 'low' is not allowed
            as gpt-4.1-mini is too weak for graph generation.
          default: medium
        judge_model:
          anyOf:
          - type: string
          - type: 'null'
          title: Judge Model
          description: 'Single judge model (deprecated: use judge_models for multiple
            models)'
        judge_models:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Judge Models
          description: List of judge models to use for workflow/graph optimization
            (allows multiple models)
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
          description: Additional metadata (parent_job_id, session_id, etc.)
        auto_start:
          type: boolean
          title: Auto Start
          description: Automatically start the job after creation
          default: true
        graph_type:
          type: string
          enum:
          - policy
          - verifier
          - rlm
          title: Graph Type
          description: 'Type of graph to train: ''policy'' (default) - maps inputs
            to outputs, ''verifier'' - trains a judge that scores traces (requires
            verifier-compliant dataset with gold scores), ''rlm'' - policy-like, but
            optimized for tool-using RLM-style execution'
          default: policy
        topology_guidance:
          anyOf:
          - type: string
          - type: 'null'
          title: Topology Guidance
          description: Optional additional guidance for the graph proposer (beyond
            graph_structure). Useful for RLM-style pipelines (e.g., 'Use tools to
            keep long context out of LLM prompts').
        configured_tools:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Configured Tools
          description: 'Optional job-bound tool allowlist for graph optimization.
            Each tool binding should look like: {''name'': ''codex_exec'', ''kind'':
            ''daytona_exec'', ''stateful'': true}.'
        problem_spec:
          anyOf:
          - type: string
          - type: 'null'
          title: Problem Spec
          description: Detailed problem specification for the graph proposer. Include
            domain-specific information like valid output labels for classification,
            constraints, format requirements, or any other info needed to generate
            correct graphs. This is combined with the dataset's task_description to
            form the full proposer context.
      type: object
      title: GraphGenJobCreateRequest
      description: Request to create an GraphGen optimization job.
    GraphGenJobCreateResponse:
      properties:
        job_id:
          type: string
          title: Job Id
          description: Primary job ID (synth_jobs.job_id)
        graphgen_job_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Graphgen Job Id
          description: 'Deprecated: use job_id'
        gepa_job_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Gepa Job Id
          description: Internal learning job ID
        graph_evolve_job_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Graph Evolve Job Id
        graph_evolve_dataset_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Graph Evolve Dataset Id
        graph_evolve_dataset_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Graph Evolve Dataset Key
        status:
          type: string
          title: Status
        dataset_name:
          type: string
          title: Dataset Name
        task_count:
          type: integer
          title: Task Count
        rollout_budget:
          type: integer
          title: Rollout Budget
        policy_model:
          type: string
          title: Policy Model
        policy_models:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Policy Models
        judge_mode:
          type: string
          title: Judge Mode
        graph_type:
          type: string
          title: Graph Type
          description: '''policy'', ''verifier'', or ''rlm'''
          default: policy
        poll_url:
          type: string
          title: Poll Url
      type: object
      required:
      - job_id
      - status
      - dataset_name
      - task_count
      - rollout_budget
      - policy_model
      - judge_mode
      - poll_url
      title: GraphGenJobCreateResponse
      description: Response from creating an GraphGen job.
    GraphGenJobMetadataResponse:
