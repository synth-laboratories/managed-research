openapi: 3.1.0
info:
  title: Synth API
  description: Synth backend API
  version: 0.1.0
paths:
  /config/pricing:
    get:
      summary: Get Pricing Config
      description: 'Get current pricing configuration _config.config.


        This endpoint exposes pricing-related configuration that the frontend

        can use to display current gating mode and billing provider status.

        Useful for support teams to verify live configuration.'
      operationId: get_pricing_config_config_pricing_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingConfigResponse'
  /health/live:
    get:
      summary: Liveness
      description: Simple liveness probe that doesn't check database.
      operationId: liveness_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Liveness Health Live Get
  /version:
    get:
      summary: Version
      description: Return queryable backend SemVer and deploy metadata.
      operationId: version_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /api/v1/version:
    get:
      summary: Version
      description: Return queryable backend SemVer and deploy metadata.
      operationId: version_api_v1_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /health:
    get:
      summary: Health
      description: "Health check endpoint with database connectivity test.\n\nReturns\
        \ service status and database connectivity.\nUses SQLAlchemy for database\
        \ connectivity.\n\n``details[\"build\"]`` mirrors ``app.core.build_metadata``\
        \ (``git_sha``, etc.) so\noperators can align deploy revisions with smokes;\
        \ see ``smr_launch_sunday.txt`` \xA7P1."
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__routes_misc__HealthResponse'
  /health/db:
    get:
      summary: Health Db
      description: DB health snapshot without touching the database.
      operationId: health_db_health_db_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Db Health Db Get
  /health/db/cleanup:
    post:
      summary: Cleanup Idle Connections
      description: 'Kill idle database connections to recover from pool exhaustion.


        This endpoint attempts to kill idle connections using multiple methods:

        1. PostgREST RPC (if function deployed)

        2. Direct database connection

        3. Provider-specific APIs (if available)


        Returns cleanup result including number of connections killed.'
      operationId: cleanup_idle_connections_health_db_cleanup_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Cleanup Idle Connections Health Db Cleanup Post
  /health/db/emergency-reset:
    post:
      summary: Emergency Pool Reset Endpoint
      description: "Emergency reset - kills ALL connections (not just idle).\n\n\u26A0\
        \uFE0F Use this only when pool is completely stuck and normal cleanup fails.\n\
        This will interrupt any in-progress queries!"
      operationId: emergency_pool_reset_endpoint_health_db_emergency_reset_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Emergency Pool Reset Endpoint Health Db Emergency
                  Reset Post
  /unsubscribe:
    get:
      summary: Unsubscribe Get
      operationId: unsubscribe_get_unsubscribe_get
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
    post:
      summary: Unsubscribe Post
      operationId: unsubscribe_post_unsubscribe_post
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
  /api/v1/auth/permissions:
    get:
      tags:
      - auth
      summary: Get Permissions
      description: Get organization permissions using SQLAlchemy.
      operationId: get_permissions_api_v1_auth_permissions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsResponse'
  /api/v1/auth/token:
    post:
      tags:
      - auth
      summary: Issue Access Token
      description: Exchange Synth API key for a short-lived JWT used to call vLLM
        using SQLAlchemy.
      operationId: issue_access_token_api_v1_auth_token_post
      parameters:
      - name: X-API-Key
        in: header
        required: true
        schema:
          type: string
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/key-status:
    get:
      tags:
      - auth
      summary: Check API key status
      description: "Check the status of an API key without using it for authentication.\n\
        \    \n    This endpoint helps diagnose why an API key might be failing:\n\
        \    - Whether the key exists in the database\n    - Whether it's active or\
        \ deactivated\n    - Whether it was replaced by a newer key (regenerated)\n\
        \    - What organization it belongs to\n    \n    Pass your API key in the\
        \ Authorization header (Bearer token) or X-API-Key header."
      operationId: check_key_status_api_v1_auth_key_status_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/billing/entitlements:
    get:
      tags:
      - billing
      summary: Get Billing Entitlements
      operationId: get_billing_entitlements_api_v1_billing_entitlements_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingEntitlementSnapshot'
  /api/v1/balance/current:
    get:
      tags:
      - balance
      summary: Get Current Balance
      description: "Get the current credit balance for the authenticated organization.\n\
        \nThis endpoint allows organizations to check their current credit balance\n\
        without requiring admin privileges.\n\nArgs:\n    api_key: Validated API key\
        \ containing organization information\n\nReturns:\n    BalanceResponse: Current\
        \ balance information\n\nRaises:\n    HTTPException: If balance cannot be\
        \ retrieved"
      operationId: get_current_balance_api_v1_balance_current_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
  /api/v1/balance/usage:
    get:
      tags:
      - balance
      summary: Get Usage Summary
      description: "Get usage summary for the authenticated organization.\n\nThis\
        \ endpoint provides a summary of token and GPU usage for the current month\n\
        and last 30 days.\n\nArgs:\n    api_key: Validated API key containing organization\
        \ information\n\nReturns:\n    UsageSummaryResponse: Usage summary with token\
        \ and GPU statistics\n\nRaises:\n    HTTPException: If usage data cannot be\
        \ retrieved"
      operationId: get_usage_summary_api_v1_balance_usage_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__routes_balance__UsageSummaryResponse'
  /api/v1/balance/autumn-current:
    get:
      tags:
      - balance
      summary: Get Autumn Current Balance
      description: 'Proxy to Autumn to fetch the authoritative billing state for the
        organization.


        Note: This shape is intentionally flexible (raw passthrough) because Autumn''s

        balance representation may evolve. UI should handle the `raw` payload safely.'
      operationId: get_autumn_current_balance_api_v1_balance_autumn_current_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutumnBalanceProxyResponse'
  /api/v1/credits/balance:
    get:
      tags:
      - credits
      summary: Get Credits Balance
      description: Compute org balance from credits_ledger with optional GPU hours
        remaining.
      operationId: get_credits_balance_api_v1_credits_balance_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditsBalanceResponse'
  /api/v1/credits/transactions:
    get:
      tags:
      - credits
      summary: Get Transactions
      description: Return unified purchase/usage transactions from credits_ledger
        (most recent first).
      operationId: get_transactions_api_v1_credits_transactions_get
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/credits/add:
    post:
      tags:
      - credits
      summary: Webhook Add Credits
      description: 'Add credits triggered by webhook.


        Secured by a shared secret header `x-autumn-webhook-secret` which must match

        the environment variable `AUTUMN_WEBHOOK_SECRET`.'
      operationId: webhook_add_credits_api_v1_credits_add_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookAddCreditsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/credits/autumn-webhook:
    post:
      tags:
      - credits
      summary: Autumn Webhook
      description: 'Handle Autumn webhooks with receipt tracking to prevent duplicates.


        Secured by shared secret header `x-autumn-webhook-secret`.

        Returns 409 if webhook already processed, 200 on success.'
      operationId: autumn_webhook_api_v1_credits_autumn_webhook_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/pricing/preflight:
    post:
      tags:
      - pricing
      summary: Preflight Check
      description: "Preflight check for GPU usage costs.\n\nComputes estimated cost\
        \ using GPU pricing config \xD7 seconds \xD7 containers,\nthen calls Autumn\
        \ check with mapped feature and quantity.\nReturns combined result to allow\
        \ frontend to show top-up/checkout CTA on deny."
      operationId: preflight_check_api_v1_pricing_preflight_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreflightRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreflightResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/pricing/gpu/record:
    post:
      tags:
      - pricing
      summary: Record Gpu Usage Route
      description: 'Record GPU wall-clock usage and deduct credits.


        This is designed to be called from Modal containers which cannot import backend
        services reliably.'
      operationId: record_gpu_usage_route_api_v1_pricing_gpu_record_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GPURecordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Record Gpu Usage Route Api V1 Pricing Gpu Record Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/me:
    get:
      tags:
      - me
      summary: Get Me
      operationId: get_me_api_v1_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
  /api/v1/free-tier/usage:
    get:
      tags:
      - free-tier
      summary: Get Free Tier Usage
      description: 'Get free tier usage and limits for the authenticated organization.


        Returns current usage against daily and monthly limits, plus timestamps

        for when limits reset.'
      operationId: get_free_tier_usage_api_v1_free_tier_usage_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeTierUsageResponse'
  /api/v1/usage:
    get:
      tags:
      - usage
      summary: Get Usage
      description: 'Get usage and limits for the authenticated organization.


        Returns current usage against daily and monthly limits for all API surfaces,

        organized by API type (inference, verifiers, prompt_opt, rl, sft, research).


        Response includes:

        - org_id: Organization identifier

        - tier: Current tier (free, starter, growth, enterprise)

        - period: Start dates for daily and monthly periods

        - apis: Usage metrics per API surface

        - totals: Aggregate usage (total spend)'
      operationId: get_usage_api_v1_usage_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageResponse'
  /api/v1/usage/user-limits:
    get:
      tags:
      - usage
      summary: Get User Limits
      description: 'Get effective limits for the authenticated user.


        Combines org rate limits (tier/overrides) with access-tier permissions

        (scopes, allowed models, allowed workflows).'
      operationId: get_user_limits_api_v1_usage_user_limits_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLimitsResponse'
  /api/v1/usage/tiers:
    get:
      tags:
      - usage
      summary: Get Tier Limits
      description: 'Get default rate limits for all tiers.


        Returns the default limits for each tier (free, starter, growth, enterprise).

        These are the base limits before any per-org overrides are applied.


        Use this endpoint to display pricing/limits information in your application.'
      operationId: get_tier_limits_api_v1_usage_tiers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TierLimitsResponse'
                type: array
                title: Response Get Tier Limits Api V1 Usage Tiers Get
  /api/v1/usage/tiers/{tier}:
    get:
      tags:
      - usage
      summary: Get Tier Limit
      description: "Get default rate limits for a specific tier.\n\nArgs:\n    tier:\
        \ Tier name (free, starter, growth, enterprise)\n\nReturns default limits\
        \ for the specified tier."
      operationId: get_tier_limit_api_v1_usage_tiers__tier__get
      parameters:
      - name: tier
        in: path
        required: true
        schema:
          type: string
          title: Tier
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TierLimitsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/usage/record-items:
    post:
      tags:
      - usage
      summary: Record Usage Items
      operationId: record_usage_items_api_v1_usage_record_items_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageRecordItemsIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageRecordItemsOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/usage/record:
    post:
      tags:
      - usage
      summary: Record Usage
      operationId: record_usage_api_v1_usage_record_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Record Usage Api V1 Usage Record Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/usage/preflight:
    post:
      tags:
      - usage
      summary: Preflight Usage
      operationId: preflight_usage_api_v1_usage_preflight_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreflightIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Preflight Usage Api V1 Usage Preflight Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/internal/usage/record:
    post:
      tags:
      - usage
      summary: Record Internal Usage
      operationId: record_internal_usage_api_v1_internal_usage_record_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalUsageRecordIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUsageEventOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/internal/usage/record-batch:
    post:
      tags:
      - usage
      summary: Record Internal Usage Batch
      operationId: record_internal_usage_batch_api_v1_internal_usage_record_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalUsageRecordBatchIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Record Internal Usage Batch Api V1 Internal Usage
                  Record Batch Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/subscription/checkout:
    post:
      tags:
      - subscription
      summary: Create Checkout Session
      description: "Create a checkout session for plan upgrade.\n\nRedirects to Stripe\
        \ checkout via Autumn for payment.\n\nArgs:\n    plan_type: Plan to upgrade\
        \ to (pro, team)\n    success_url: URL to redirect after successful payment\n\
        \    cancel_url: URL to redirect if payment is cancelled"
      operationId: create_checkout_session_api_v1_subscription_checkout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutSessionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/subscription/cancel:
    post:
      tags:
      - subscription
      summary: Cancel Subscription
      description: 'Cancel subscription at end of current billing period.


        Access continues until the period end, then downgrades to free tier.'
      operationId: cancel_subscription_api_v1_subscription_cancel_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelSubscriptionResponse'
  /api/v1/byok/keys:
    get:
      tags:
      - byok
      summary: List Byok Keys
      description: 'List all stored BYOK keys for the organization.


        Returns key metadata (provider, prefix, status) without decrypted keys.'
      operationId: list_byok_keys_api_v1_byok_keys_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListKeysResponse'
    post:
      tags:
      - byok
      summary: Store Byok Key
      description: "Store a new BYOK API key.\n\nThe key must be encrypted client-side\
        \ using the app's public key before\ntransmission. Use the /crypto/public-key\
        \ endpoint to get the public key.\n\nArgs:\n    provider: LLM provider (openai,\
        \ anthropic, google)\n    encrypted_key_b64: Base64-encoded ciphertext"
      operationId: store_byok_key_api_v1_byok_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreKeyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/byok/keys/{provider}:
    get:
      tags:
      - byok
      summary: Get Byok Key Info
      description: 'Get info about a specific BYOK key by provider.


        Returns key metadata without the decrypted key.'
      operationId: get_byok_key_info_api_v1_byok_keys__provider__get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/SupportedProvider'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredKeyInfo'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - byok
      summary: Delete Byok Key
      description: 'Delete a BYOK key for a provider.


        After deletion, rollouts using that provider will use Synth credits.'
      operationId: delete_byok_key_api_v1_byok_keys__provider__delete
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/SupportedProvider'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/byok/keys/{provider}/validate:
    post:
      tags:
      - byok
      summary: Validate Byok Key
      description: 'Validate a stored BYOK key with the provider''s API.


        Makes a lightweight API call to verify the key is still valid.'
      operationId: validate_byok_key_api_v1_byok_keys__provider__validate_post
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/SupportedProvider'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyValidationResult'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/byok/status:
    get:
      tags:
      - byok
      summary: Get Byok Status
      description: 'Get BYOK status including which providers have keys stored.


